<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <title>Questionnaire calc — synthetic tests</title>
  <style>
    body { font-family: ui-monospace, Menlo, monospace; max-width: 960px; margin: 32px auto; padding: 0 24px; color: #1F2F36; line-height: 1.6; }
    h1 { font-family: 'Source Serif Pro', Georgia, serif; font-size: 22px; }
    .case { padding: 8px 12px; border-left: 3px solid #CED4DA; margin: 4px 0; }
    .case.pass { border-left-color: #10B981; }
    .case.fail { border-left-color: #EF4444; background: #FEF2F2; }
    .case .name { font-weight: 600; }
    .case .detail { font-size: 12px; color: #6B7280; }
    .summary { margin-top: 16px; padding: 12px 16px; background: #F3F4F6; border-radius: 6px; font-weight: 600; }
    .summary.allgreen { background: #D1FAE5; color: #065F46; }
    .summary.anyred { background: #FEE2E2; color: #991B1B; }
    pre { font-size: 11px; background: #F9FAFB; padding: 8px 10px; border-radius: 4px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Questionnaire calibrator — synthetic test runner</h1>
  <p>Loads <code>src/questionnaire-calc.js</code> directly and runs synthetic boundary cases against <code>calculateLevel()</code>.</p>
  <div id="results"></div>
  <div id="summary" class="summary"></div>

  <script src="../src/questionnaire-calc.js"></script>
  <script>
    const calc = window._pfolioIPS.questionnaireCalc;
    const { calculateLevel } = calc;

    const cases = [
      {
        name: 'All-max — max tolerance, max capacity, max skills',
        answers: { risk_level: 'very_high', volatility: 'above_15', savings: 'gt_12m', horizon: 'gt_10y', knowledge: 'expert', objective: 'speculation', experience: ['stocks','etfs','bonds','commodities','currencies','crypto','futures','complex'] },
        expected: 4
      },
      {
        name: 'All-min — minimum across the board (capital_preservation must win over novice-floor)',
        answers: { risk_level: 'very_low', volatility: 'below_5', savings: 'lt_1m', horizon: 'lt_1y', knowledge: 'novice', objective: 'capital_preservation', experience: [] },
        expected: 0
      },
      {
        name: 'Novice + 0 exp + capital_preservation — confirms fix: objective forces 0 even with novice floor',
        answers: { risk_level: 'high', volatility: '10_15', savings: 'gt_12m', horizon: 'gt_10y', knowledge: 'novice', objective: 'capital_preservation', experience: [] },
        expected: 0
      },
      {
        name: 'Novice + 0 exp + non-preservation objective — novice floor still applies',
        answers: { risk_level: 'very_low', volatility: 'below_5', savings: 'lt_1m', horizon: 'lt_1y', knowledge: 'novice', objective: 'income_generation', experience: [] },
        expected: 1
      },
      {
        name: "Anna's profile — 32yo, stable, long horizon, capital growth, moderate skills",
        answers: { risk_level: 'high', volatility: '10_15', savings: '6_12m', horizon: 'gt_10y', knowledge: 'intermediate', objective: 'capital_growth', experience: ['etfs','stocks'] },
        expected: 3
      },
      {
        name: 'Capital preservation forces 0 even with everything else high',
        answers: { risk_level: 'very_high', volatility: 'above_15', savings: 'gt_12m', horizon: 'gt_10y', knowledge: 'expert', objective: 'capital_preservation', experience: ['stocks','etfs','bonds','commodities','currencies','crypto','futures','complex'] },
        expected: 0
      },
      {
        name: 'Conservative volatility caps high risk — vol=below_5 wins',
        answers: { risk_level: 'high', volatility: 'below_5', savings: 'gt_12m', horizon: 'gt_10y', knowledge: 'expert', objective: 'capital_growth', experience: ['etfs','stocks','bonds'] },
        expected: 0
      },
      {
        name: 'Short horizon caps risk — very_high tolerance + lt_1y horizon',
        answers: { risk_level: 'very_high', volatility: 'above_15', savings: 'gt_12m', horizon: 'lt_1y', knowledge: 'expert', objective: 'speculation', experience: ['stocks','etfs','bonds','commodities','currencies','crypto','futures','complex'] },
        expected: 0
      },
      {
        name: 'Low savings caps high tolerance',
        answers: { risk_level: 'very_high', volatility: 'above_15', savings: 'lt_1m', horizon: 'gt_10y', knowledge: 'expert', objective: 'speculation', experience: ['etfs','stocks'] },
        expected: 0
      },
      {
        name: 'Income-seeking moderate — typical mid-career profile',
        answers: { risk_level: 'moderate', volatility: '5_75', savings: '3_6m', horizon: '5_10y', knowledge: 'intermediate', objective: 'income_generation', experience: ['etfs','bonds'] },
        expected: 1
      },
      {
        name: 'Knowledge floor — beginner with high tolerance gets reduced via skills',
        answers: { risk_level: 'very_high', volatility: 'above_15', savings: 'gt_12m', horizon: 'gt_10y', knowledge: 'beginner', objective: 'capital_growth', experience: ['etfs'] },
        expected: 2
      },
      {
        name: 'Skills reduction capped at 2 — calc never falls more than 2 per step',
        answers: { risk_level: 'high', volatility: '10_15', savings: 'gt_12m', horizon: 'gt_10y', knowledge: 'beginner', objective: 'capital_growth', experience: [] },
        expected: 2
      },
      {
        name: 'NOTE: novice + 0 experience does NOT reduce a high calc (special branch — confirms documented behaviour)',
        answers: { risk_level: 'very_high', volatility: 'above_15', savings: 'gt_12m', horizon: 'gt_10y', knowledge: 'novice', objective: 'speculation', experience: [] },
        expected: 4
      },
      {
        name: 'NOTE: novice + 1 experience triggers skills reduction (asymmetric vs 0 exp)',
        answers: { risk_level: 'very_high', volatility: 'above_15', savings: 'gt_12m', horizon: 'gt_10y', knowledge: 'novice', objective: 'speculation', experience: ['etfs'] },
        expected: 2
      },
      {
        name: 'Objective downgrade — capital_growth(3) below calc(4) reduces by 1',
        answers: { risk_level: 'very_high', volatility: 'above_15', savings: 'gt_12m', horizon: 'gt_10y', knowledge: 'expert', objective: 'capital_growth', experience: ['stocks','etfs','bonds','commodities','currencies','crypto','futures','complex'] },
        expected: 3
      },
      {
        name: 'Objective downgrade capped at 2',
        answers: { risk_level: 'very_high', volatility: 'above_15', savings: 'gt_12m', horizon: 'gt_10y', knowledge: 'expert', objective: 'income_generation', experience: ['stocks','etfs','bonds','commodities','currencies','crypto','futures','complex'] },
        expected: 2
      },
      {
        name: 'Direct path: levelFromVolatility(10_15) = 3',
        custom: () => calc.levelFromVolatility('10_15'),
        expected: 3
      },
      {
        name: 'IPS horizon mapping: 15_25y → gt_10y',
        custom: () => calc.ipsHorizonToQuestionnaire('15_25y'),
        expected: 'gt_10y'
      }
    ];

    const resultsEl = document.getElementById('results');
    let pass = 0, fail = 0;
    cases.forEach((c) => {
      const got = c.custom ? c.custom() : calculateLevel(c.answers);
      const ok = got === c.expected;
      if (ok) pass++; else fail++;
      const div = document.createElement('div');
      div.className = 'case ' + (ok ? 'pass' : 'fail');
      div.innerHTML = `<div class="name">${ok ? '✓' : '✗'} ${c.name}</div>` +
        `<div class="detail">expected ${c.expected}, got ${got}</div>`;
      if (!ok) {
        const pre = document.createElement('pre');
        pre.textContent = JSON.stringify(c.answers || c.custom?.toString(), null, 2);
        div.appendChild(pre);
      }
      resultsEl.appendChild(div);
    });

    const sum = document.getElementById('summary');
    sum.textContent = `${pass} pass · ${fail} fail · ${cases.length} total`;
    sum.classList.add(fail === 0 ? 'allgreen' : 'anyred');
    console.log(`[calc-test] ${pass}/${cases.length} pass`);
  </script>
</body>
</html>
